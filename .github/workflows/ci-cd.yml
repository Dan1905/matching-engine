name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test

  publish:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Package application
        run: ./mvnw -B -DskipTests package

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}
          IMAGE_TAG=${GITHUB_SHA}
          docker build -t "$REGISTRY/$IMAGE_NAME_LOWER:$IMAGE_TAG" .
          docker tag "$REGISTRY/$IMAGE_NAME_LOWER:$IMAGE_TAG" "$REGISTRY/$IMAGE_NAME_LOWER:latest"
          docker push "$REGISTRY/$IMAGE_NAME_LOWER:$IMAGE_TAG"
          docker push "$REGISTRY/$IMAGE_NAME_LOWER:latest"
